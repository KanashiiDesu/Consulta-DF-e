<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Consulta DF-e</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style class="">
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e); /* Ajuste no gradiente */
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* Para posicionar a assinatura */
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      background-color: #ffffff; /* Branco sólido para melhor contraste do conteúdo */
      padding: 35px 45px; /* Leve ajuste no padding */
      border-radius: 15px; /* Bordas mais arredondadas */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Sombra mais suave */
      max-width: 500px; /* Leve aumento na largura máxima */
      width: 100%;
      text-align: center;
      color: #333333;
    }

    h1 {
      margin-bottom: 35px; /* Maior margem inferior */
      font-weight: 700;
      font-size: 1.8rem; /* Tamanho ligeiramente ajustado */
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 .fa-file-invoice-dollar {
        margin-right: 12px; /* Espaço entre ícone e texto */
        font-size: 2.2rem; /* Ícone um pouco maior que o texto */
    }

    .document-section {
        margin-bottom: 30px;
        padding: 20px;
        background-color: #f8f9fa; /* Fundo sutil para cada seção */
        border-radius: 10px;
        border: 1px solid #e9ecef; /* Borda leve */
    }
    .document-section:last-of-type {
        margin-bottom: 0;
    }

    label {
      display: flex; /* Para alinhar ícone e texto */
      align-items: center;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 1.05rem; /* Leve ajuste */
      text-align: left;
      color: #005a40; /* Tom de verde um pouco diferente */
    }

    label .fa-solid {
        margin-right: 8px;
        color: #004d38;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 20px;
    }

    .input-wrapper .fa-key {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.9rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 15px 12px 40px; /* Padding esquerdo para o ícone */
      border-radius: 8px;
      border: 1px solid #ced4da; /* Borda mais suave por padrão */
      font-size: 1rem;
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53; /* Cor de foco verde */
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25); /* Sombra de foco correspondente */
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px; /* Espaço entre ícone e texto no botão */
      margin-top: 10px;
      padding: 12px 25px; /* Padding ajustado */
      font-size: 1rem; /* Tamanho da fonte ajustado */
      font-weight: 600; /* Peso da fonte */
      border: none;
      border-radius: 8px;
      background-color: #ffb700; /* Amarelo/Laranja principal */
      color: #3d2800; /* Cor de texto escura para contraste com amarelo */
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    button .fa-solid {
        font-size: 1.1em; /* Ícone ligeiramente maior no botão */
    }

    button:hover {
      background-color: #e6a200; /* Amarelo mais escuro no hover */
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    p.info {
      font-size: 0.8rem; /* Texto informativo menor */
      color: #555555;
      margin-top: 10px; /* Espaçamento superior */
      text-align: left;
      line-height: 1.4;
    }

    p.info .fa-info-circle {
        margin-right: 5px;
        color: #007a53;
    }

    .assinatura {
      margin-top: 30px; /* Espaço acima da assinatura */
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7); /* Cor mais clara */
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400; /* Peso da fonte mais leve */
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Consulta DF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe">Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
    </div>

    <div class="document-section">
      <label>Consulta NF-e:</label>
      <button id="consultar-nfe"><i class="fa-solid fa-arrow-up-right-from-square"></i>Abrir Portal Oficial NF-e</button>
      <p class="info">
        <i class="fa-solid fa-info-circle"></i>A consulta da NF-e requer a resolução de um hCaptcha diretamente no portal oficial.
      </p>
    </div>

    <div class="document-section">
      <label for="chave-cte">Chave do CT-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-cte"
          name="chave-cte"
          placeholder="Digite os 44 números da chave do CT-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-cte"><i class="fa-solid fa-magnifying-glass"></i>Consultar CT-e</button>
    </div>
  </div>

  <div class="assinatura">by Thalis Gomes</div>

  <script>
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');

      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);

      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const camposChave = [
      document.getElementById('chave-mdfe'),
      document.getElementById('chave-cte')
    ];

    camposChave.forEach((input) => {
      if (input) {
        input.addEventListener('input', somenteNumeros);
        input.addEventListener('paste', handlePaste);
      }
    });

    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const input = document.getElementById('chave-mdfe');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
          window.open(url, '_blank');
          input.value = '';
        } else {
          alert('Por favor, insira uma chave do MDF-e válida com 44 números.');
        }
      });
    }

    const btnConsultarNfe = document.getElementById('consultar-nfe');
    if (btnConsultarNfe) {
      btnConsultarNfe.addEventListener('click', () => {
        alert(
          'Você será redirecionado para o portal oficial da NF-e. Lá, insira a chave e resolva o hCaptcha.'
        );
        window.open(
          'https://www.nfe.fazenda.gov.br/portal/consultaRecaptcha.aspx?tipoConsulta=resumo&tipoConteudo=7PhJ+gAVw2g=',
          '_blank'
        );
      });
    }

    const btnConsultarCte = document.getElementById('consultar-cte');
    if (btnConsultarCte) {
      btnConsultarCte.addEventListener('click', () => {
        const input = document.getElementById('chave-cte');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const url = `https://dfe-portal.svrs.rs.gov.br/cte/qrCode?chCTe=${chave}&tpAmb=1`;
          window.open(url, '_blank');
          input.value = '';
        } else {
          alert('Por favor, insira uma chave do CT-e válida com 44 números.');
        }
      });
    }
  </script>
</body>
</html>
