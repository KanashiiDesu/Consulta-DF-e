<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta DF-e</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23004d38"/><stop offset="100%" stop-color="%23007a53"/></linearGradient></defs><path fill="url(%23grad)" d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128z"/></svg>'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e); 
      min-height: 100vh;
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 10px;
    }

    .container {
      background-color: #ffffff; 
      padding: 30px 25px;
      border-radius: 15px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
      max-width: 500px; 
      width: 100%;
      margin: 10px 0;
      text-align: center;
      color: #333333;
    }

    h1 {
      margin-bottom: 30px; 
      font-weight: 700;
      font-size: 1.6rem;
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .document-section {
        margin-bottom: 25px;
        padding: 15px;
        background-color: #f8f9fa; 
        border-radius: 10px;
        border: 1px solid #e9ecef; 
    }
    .document-section:last-of-type {
        margin-bottom: 0;
    }

    label {
      display: flex; 
      align-items: center;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 1rem;
      text-align: left;
      color: #005a40; 
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 15px;
    }

    .input-wrapper .fa-key {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.85rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 15px 10px 35px;
      border-radius: 8px;
      border: 1px solid #ced4da; 
      font-size: 0.95rem;
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53; 
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25); 
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px; 
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600; 
      border: none;
      border-radius: 8px;
      background-color: #ffb700; 
      color: #3d2800; 
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
      text-align: center;
    }

    button .fa-solid {
        font-size: 1em; 
    }

    button:hover {
      background-color: #e6a200; 
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    p.info {
      font-size: 0.75rem; 
      color: #555555;
      margin-top: 8px; 
      text-align: left;
      line-height: 1.4;
    }

    p.info .fa-info-circle {
        margin-right: 5px;
        color: #007a53;
    }

    .assinatura {
      margin-top: 25px; 
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7); 
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400; 
    }

    .modal {
      display: none; 
      position: fixed; 
      z-index: 1000; 
      left: 0;
      top: 0;
      width: 100%; 
      height: 100%; 
      overflow: auto; 
      background-color: rgba(0,0,0,0.5); 
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 95%;
      max-width: 400px; 
      text-align: center;
      color: #333;
    }

    .modal-content h2 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #004d38; 
      font-size: 1.4rem;
    }
    
    .modal-content p {
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 0.9rem;
      text-align: left; 
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end; 
      gap: 10px; 
      margin-top: 15px;
    }

    .modal-buttons button {
      display: flex; /* Para centralizar texto interno */
      align-items: center; /* Alinhamento vertical */
      justify-content: center; /* Alinhamento horizontal */
      gap: 0; 
      text-align: center; 
      flex: 0 1 auto; 
      padding: 8px 15px;
      font-weight: 500;
      font-size: 0.9rem;
      border-radius: 6px;
      border: 1px solid transparent;
    }
    
    .modal-buttons .confirm-action-btn { 
        background-color: #007a53; 
        color: white;
        border-color: #007a53;
    }
    .modal-buttons .confirm-action-btn:hover {
        background-color: #006a4e;
        border-color: #006a4e;
    }

    .modal-buttons .cancel-action-btn { 
        background-color: #dc3545; 
        color: white;
        border-color: #dc3545;
    }
    .modal-buttons .cancel-action-btn:hover {
        background-color: #c82333;
        border-color: #c82333;
    }
    
    .modal-buttons .secondary-ok-btn { 
        background-color: #e9ecef;
        color: #333; 
        border-color: #ced4da;
    }
    .modal-buttons .secondary-ok-btn:hover {
        background-color: #dee2e6;
        border-color: #b6bfc8;
    }

    /* --- MEDIA QUERIES PARA RESPONSIVIDADE --- */
    @media (min-width: 601px) {
        .container { padding: 35px 45px; }
        h1 { font-size: 1.8rem; margin-bottom: 35px; }
        .document-section { padding: 20px; margin-bottom: 30px; }
        label { font-size: 1.05rem; margin-bottom: 12px; }
        input[type="text"] { padding: 12px 15px 12px 40px; font-size: 1rem; }
        .input-wrapper .fa-key { font-size: 0.9rem; left: 15px; }
        button { padding: 12px 25px; font-size: 1rem; gap: 10px; }
        button .fa-solid { font-size: 1.1em; }
        p.info { font-size: 0.8rem; margin-top: 10px; }
        .assinatura { margin-top: 30px; font-size: 0.85rem; }
        .modal-content { padding: 30px; }
        .modal-content h2 { font-size: 1.5rem; margin-bottom: 20px; }
        .modal-content p { font-size: 0.95rem; margin-bottom: 25px; }
        .modal-buttons button { padding: 10px 20px; font-size: 0.95rem; }
    }

    @media (max-width: 400px) {
        body { padding: 5px; }
        .container { padding: 20px 15px; margin: 5px 0; }
        h1 { font-size: 1.4rem; margin-bottom: 20px; }
        input[type="text"] { font-size: 0.9rem; padding: 10px 10px 10px 30px; }
        .input-wrapper .fa-key { font-size: 0.8rem; left: 10px; }
        button { font-size: 0.9rem; padding: 10px 15px; }
        .modal-content { padding: 15px; }
        .modal-content h2 { font-size: 1.2rem; }
        .modal-content p { font-size: 0.85rem; }
        .modal-buttons { flex-direction: column; gap: 8px; }
        .modal-buttons button { width: 100%; padding: 10px; }
    }

</style>
</head>
<body>
  
  <div class="container">
    <h1>Consulta DF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe">Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
    </div>

    <div class="document-section">
      <label>Consulta NF-e:</label>
      <button id="consultar-nfe"><i class="fa-solid fa-arrow-up-right-from-square"></i>Abrir Portal Oficial NF-e</button>
      <p class="info">
        <i class="fa-solid fa-info-circle"></i>A consulta da NF-e requer a resolução de um hCaptcha diretamente no portal oficial.
      </p>
    </div>

    <div class="document-section">
      <label for="chave-cte">Chave do CT-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-cte"
          name="chave-cte"
          placeholder="Digite os 44 números da chave do CT-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-cte"><i class="fa-solid fa-magnifying-glass"></i>Consultar CT-e</button>
    </div>
  </div>

  <div class="assinatura">by Thalis Gomes</div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <h2 id="infoModalTitleText"></h2> 
      <p id="infoModalMessage"></p>
      <div class="modal-buttons">
        <button id="confirmModalActionBtn">OK</button> 
        <button class="cancel-action-btn" id="cancelModalActionBtn" style="display: none;">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');

      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);

      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const camposChave = [
      document.getElementById('chave-mdfe'),
      document.getElementById('chave-cte')
    ];

    camposChave.forEach((input) => {
      if (input) {
        input.addEventListener('input', somenteNumeros);
        input.addEventListener('paste', handlePaste);
      }
    });

    const infoModal = document.getElementById('infoModal');
    const infoModalTitleElement = document.getElementById('infoModalTitleText'); 
    const infoModalMessage = document.getElementById('infoModalMessage');
    const confirmModalActionBtn = document.getElementById('confirmModalActionBtn');
    const cancelModalActionBtn = document.getElementById('cancelModalActionBtn');

    let specificModalConfirmAction = null; 

    function showInfoModal(title, message, confirmAction = null, showCancelBtn = false, isErrorType = true) {
        if (infoModalTitleElement) {
            infoModalTitleElement.textContent = title;
            if (isErrorType) {
                infoModalTitleElement.style.color = '#dc3545'; 
            } else {
                infoModalTitleElement.style.color = '#004d38'; 
            }
        }

        if (infoModalMessage) infoModalMessage.innerHTML = message.replace(/\n/g, '<br>');
        
        specificModalConfirmAction = confirmAction;

        if (confirmModalActionBtn) {
            confirmModalActionBtn.className = 'button'; // Reseta para classe base de botão do modal (sem 'modal-buttons' aqui)

            if (showCancelBtn) { 
                confirmModalActionBtn.textContent = 'Continuar';
                confirmModalActionBtn.classList.add('confirm-action-btn'); // Estilo verde
                if (cancelModalActionBtn) cancelModalActionBtn.style.display = 'inline-flex';
            } else { 
                confirmModalActionBtn.textContent = 'OK';
                // Sempre usa 'secondary-ok-btn' (cinza) para o OK sozinho nos erros
                // Se isErrorType for true e não houver confirmAction E não houver showCancelBtn
                 if (isErrorType && !confirmAction && !showCancelBtn) {
                    confirmModalActionBtn.classList.add('secondary-ok-btn');
                } else { // Para outros casos de "OK" sozinho (ex: informativos sem cancel) ou com ação, manter verde.
                     confirmModalActionBtn.classList.add('confirm-action-btn');
                }
                if (cancelModalActionBtn) cancelModalActionBtn.style.display = 'none';
            }
        }

        if (infoModal) infoModal.style.display = 'flex';
    }

    function handleModalConfirmAndHide() {
        if (infoModal) infoModal.style.display = 'none';
        if (typeof specificModalConfirmAction === 'function') {
            specificModalConfirmAction(); 
        }
        cleanupModalState();
    }

    function handleModalCancelAndHide() {
        if (infoModal) infoModal.style.display = 'none';
        cleanupModalState();
    }

    function cleanupModalState() {
        specificModalConfirmAction = null; 
        if (cancelModalActionBtn) cancelModalActionBtn.style.display = 'none';
        if (confirmModalActionBtn) {
            confirmModalActionBtn.textContent = 'OK'; 
            // Reseta para o estilo que será redefinido por showInfoModal
            confirmModalActionBtn.className = 'button'; 
            confirmModalActionBtn.classList.add('confirm-action-btn'); // Padrão verde ao limpar
        }
        if (infoModalTitleElement) infoModalTitleElement.style.color = '#004d38'; 
    }


    if (confirmModalActionBtn) {
        confirmModalActionBtn.addEventListener('click', handleModalConfirmAndHide);
    }
    if (cancelModalActionBtn) {
        cancelModalActionBtn.addEventListener('click', handleModalCancelAndHide);
    }
    
    window.addEventListener('click', (event) => {
        if (event.target == infoModal) { 
            handleModalCancelAndHide(); 
        }
    });


    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const input = document.getElementById('chave-mdfe');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const modeloDocumento = chave.substring(20, 22); 
          
          if (modeloDocumento === '58') { // MDF-e
            const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
            window.open(url, '_blank');
            input.value = ''; 
          } else if (modeloDocumento === '57') { // CT-e
            showInfoModal('Tipo de Documento Incorreto', 'A chave inserida no campo MDF-e é de um CT-e (modelo 57).\n\nPor favor, utilize o campo "Chave do CT-e" ou insira uma chave de MDF-e válida.', null, false, true);
            input.value = ''; 
          } else if (modeloDocumento === '55') { // NF-e
            showInfoModal('Tipo de Documento Incorreto', 'A chave inserida no campo MDF-e é de uma NF-e (modelo 55).\n\nPor favor, utilize o "Portal Oficial NF-e" ou insira uma chave de MDF-e válida.', null, false, true);
            input.value = ''; 
          } else {
            showInfoModal('Chave de MDF-e Inválida', `A chave inserida (modelo ${modeloDocumento || 'desconhecido'}) não parece ser de um MDF-e (modelo 58).\n\nVerifique a chave.`, null, false, true);
            input.value = ''; 
          }
        } else {
          showInfoModal('Chave de MDF-e Inválida', 'Por favor, insira uma chave do MDF-e válida com 44 números.', null, false, true);
          input.value = ''; 
        }
      });
    }

    const btnConsultarNfe = document.getElementById('consultar-nfe');
    if (btnConsultarNfe) {
      btnConsultarNfe.addEventListener('click', () => {
        window.open(
          'https://www.nfe.fazenda.gov.br/portal/consultaRecaptcha.aspx?tipoConsulta=resumo&tipoConteudo=7PhJ+gAVw2g=',
          '_blank'
        );
      });
    }

    const btnConsultarCte = document.getElementById('consultar-cte');
    if (btnConsultarCte) {
      btnConsultarCte.addEventListener('click', () => {
        const input = document.getElementById('chave-cte');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const modeloDocumento = chave.substring(20, 22); 

          if (modeloDocumento === '57') { // CT-e
            const url = `https://dfe-portal.svrs.rs.gov.br/cte/qrCode?chCTe=${chave}&tpAmb=1`;
            window.open(url, '_blank');
            input.value = ''; 
          } else if (modeloDocumento === '58') { // MDF-e
            showInfoModal('Tipo de Documento Incorreto', 'A chave inserida no campo CT-e é de um MDF-e (modelo 58).\n\nPor favor, utilize o campo "Chave do MDF-e" ou insira uma chave de CT-e válida.', null, false, true);
            input.value = ''; 
          } else if (modeloDocumento === '55') { // NF-e
             showInfoModal('Tipo de Documento Incorreto', 'A chave inserida no campo CT-e é de uma NF-e (modelo 55).\n\nPor favor, utilize o "Portal Oficial NF-e" ou insira uma chave de CT-e válida.', null, false, true);
             input.value = ''; 
          } else {
            showInfoModal('Chave de CT-e Inválida', `A chave inserida (modelo ${modeloDocumento || 'desconhecido'}) não parece ser de um CT-e (modelo 57).\n\nVerifique a chave.`, null, false, true);
            input.value = ''; 
          }
        } else {
          showInfoModal('Chave de CT-e Inválida', 'Por favor, insira uma chave do CT-e válida com 44 números.', null, false, true);
          input.value = ''; 
        }
      });
    }
  </script>
</body>
</html>
